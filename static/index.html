<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SciSchedule</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>SciSchedule</h1>
          <p>Protocol-aware scientific planning</p>
        </div>

        <button id="new-protocol-btn" class="btn primary">New Protocol</button>

        <section>
          <h2>Recent Protocols</h2>
          <ul id="protocol-list" class="protocol-list"></ul>
        </section>

        <section>
          <h2>Experiments</h2>
          <ul id="experiment-list" class="experiment-list"></ul>
        </section>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <label class="scientist-profile" title="Default scientist">
              <span class="scientist-icon" aria-hidden="true">👤</span>
              <input id="scientist-name" class="scientist-name-input" value="Katherine" />
            </label>
            <div class="tabs">
              <button class="tab active" data-view="month">Month</button>
              <button class="tab" data-view="week">Week</button>
            </div>
          </div>
          <div class="actions">
            <button id="new-protocol-btn-top" class="btn primary">New Protocol</button>
            <button id="lock-selected-btn" class="btn" disabled>Lock Selected Draft</button>
            <button id="today-btn" class="btn">Today</button>
          </div>
        </header>
        <div id="status-line" class="status-line"></div>
        <div id="touch-hint" class="touch-hint" style="display:none"></div>

        <section id="placement-panel" class="placement-panel hidden">
          <div>
            <strong id="placement-title">Protocol Placement</strong>
            <p id="placement-subtitle">
              Drag across the calendar to preview all tasks before creating the draft.
            </p>
          </div>
          <div class="placement-candidate-wrap">
            <span class="placement-label">Candidate</span>
            <div id="placement-candidate" class="placement-candidate" draggable="true"></div>
          </div>
          <div class="placement-actions">
            <button id="placement-create" class="btn primary">Create Draft</button>
            <button id="placement-cancel" class="btn">Cancel</button>
          </div>
        </section>
        <section id="month-view" class="view active">
          <div class="view-header">
            <button id="month-prev" class="btn">Prev</button>
            <h2 id="month-title"></h2>
            <button id="month-next" class="btn">Next</button>
          </div>
          <div id="month-weekdays" class="month-weekdays"></div>
          <div id="month-grid" class="month-grid"></div>
        </section>

        <section id="week-view" class="view">
          <div class="view-header">
            <button id="week-prev" class="btn">Prev</button>
            <h2 id="week-title"></h2>
            <button id="week-next" class="btn">Next</button>
          </div>
          <div id="week-grid" class="week-grid"></div>
        </section>

      </main>
    </div>

    <dialog id="protocol-dialog">
      <form id="protocol-form" class="dialog-form protocol-dialog-form">
        <div class="dialog-header">
          <h3 id="protocol-dialog-title">Create Protocol</h3>
        </div>

        <div class="protocol-meta">
          <label class="field">
            <span class="field-label">Protocol Name</span>
            <input name="name" required placeholder="e.g., Cell Culture Prep" />
          </label>
          <label class="field">
            <span class="field-label">Description</span>
            <textarea name="description" rows="2" placeholder="Brief description of this protocol"></textarea>
          </label>
        </div>

        <div class="steps-section">
          <div class="steps-section-header">
            <span class="steps-section-title">Steps</span>
            <button type="button" id="add-step" class="btn btn-sm">+ Add Step</button>
          </div>
          <div id="steps-container" class="steps-container"></div>
        </div>

        <div id="dag-preview" class="dag-preview">
          <span class="dag-preview-title">Dependency Graph</span>
          <div id="dag-canvas" class="dag-canvas"></div>
        </div>

        <div class="dialog-actions">
          <button type="button" id="cancel-protocol" class="btn">Cancel</button>
          <button id="save-protocol-btn" type="submit" class="btn primary">Save Protocol</button>
        </div>
      </form>
    </dialog>


    <script src="/static/app.js" defer></script>
  </body>
</html>
